<section class="faq-section">
  <h2 class="faq-title animate-fade-up">{{ 'FAQ.TITLE' | translate }}</h2>

  <div class="faq-list">
    @for (i of [1,2,3,4,5,6,7,8]; track i) {
      <div class="faq-item animate-fade-up" [class.open]="openIndex === i" (click)="toggle(i)">
        <div class="faq-question">
          <span>{{ 'FAQ.Q' + i | translate }}</span>
          <i class="fas fa-chevron-down faq-icon"></i>
        </div>
        @if (openIndex === i) {
          <div class="faq-answer">
            <p>{{ 'FAQ.A' + i | translate }}</p>
          </div>
        }
      </div>
    }
  </div>
</section>
