server.port=${PORT:8080}

# Email (Resend HTTP API)
resend.api-key=${RESEND_API_KEY:}
patitoland.contact.email=${MAIL_TO:patitoland.parcinfantil@gmail.com}
patitoland.from.email=${MAIL_FROM:onboarding@resend.dev}
spring.mail.host=none
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailAutoConfiguration

# PostgreSQL (Neon or local)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/patitoland}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update

# CORS
cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,http://localhost:4201}
