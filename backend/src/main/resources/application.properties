server.port=${PORT:8080}

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME:patitoland.parcinfantil@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
patitoland.contact.email=${MAIL_USERNAME:patitoland.parcinfantil@gmail.com}

# PostgreSQL (Neon or local)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/patitoland}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update

# CORS
cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,http://localhost:4201}
